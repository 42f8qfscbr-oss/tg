name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: deepseek/DeepSeek-V4-Pro
          agent: github-builder
          share: true
          use_github_token: true
          prompt: |
            Follow AGENTS.md and the repository docs.
            This repository is an OpenCode automation workspace for independent Python task projects.
            Use GitHub issue or PR context as the source task.
            Use context7 for official docs and gh_grep for public GitHub examples when useful.
            Do not copy license-incompatible open source code.
            Implement the requested change in a focused branch, add tests where appropriate, run validation, and open or update a pull request.
